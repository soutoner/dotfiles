---
- name: Provision system with dotfiles
  hosts: localhost
  gather_facts: yes
  
  vars:
    # Get the actual user (handles both normal and sudo execution)
    user: "{{ ansible_user_id if ansible_user_id != 'root' else ansible_env.SUDO_USER | default(ansible_user_id) }}"
    home_dir: "{{ ansible_user_dir if ansible_user_id != 'root' else ansible_env.HOME | default('/home/' + (ansible_env.SUDO_USER | default(ansible_user_id))) }}"
    dotfiles_dir: "{{ playbook_dir }}"
    group: "{{ 'staff' if ansible_os_family == 'Darwin' else user }}"
    should_become: "{{ ansible_os_family == 'Debian' }}"

  pre_tasks:
    - name: Display provisioning information
      debug:
        msg: |
          Provisioning dotfiles for:
          OS: {{ ansible_os_family }} ({{ ansible_distribution }})
          User: {{ user }}
          Home: {{ home_dir }}
          Dotfiles: {{ dotfiles_dir }}
          Using sudo: {{ should_become }}
      when: debug | default(false) | bool

  roles:
    - common
    - packages
    - shell
    - chezmoi
