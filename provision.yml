---
- name: Provision system with dotfiles
  hosts: localhost
  become: "{{ 'yes' if ansible_os_family == 'Debian' else 'no' }}"
  
  vars:
    user: "{{ ansible_user_id }}"
    home_dir: "{{ ansible_user_dir }}"
    dotfiles_dir: "{{ playbook_dir }}"
    group: "{{ 'staff' if ansible_os_family == 'Darwin' else user }}"

  roles:
    - common
    - packages
    - shell
    - chezmoi

  post_tasks:
    - name: Ensure proper permissions on home directory
      file:
        path: "{{ home_dir }}"
        owner: "{{ user }}"
        group: "{{ group }}"
        recurse: yes
