---
- name: Provision Ubuntu system with dotfiles
  hosts: localhost
  become: yes
  vars:
    user: "{{ ansible_user_id }}"
    home_dir: "/home/{{ user }}"
    dotfiles_repo: "https://github.com/{{ github_user }}/dotfiles.git"
    oh_my_zsh_url: "https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh"
    chezmoi_installer_url: "https://get.chezmoi.io"
    oh_my_zsh_plugins_dir: "{{ home_dir }}/.oh-my-zsh/custom/plugins"
    oh_my_zsh_themes_dir: "{{ home_dir }}/.oh-my-zsh/custom/themes"

  tasks:
    - name: Update package manager cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - git
          - zsh
          - tmux
          - vim
          - wget
          - curl
          - fzf
        state: present

    - name: Set zsh as default shell
      user:
        name: "{{ user }}"
        shell: /usr/bin/zsh

    - name: Create .oh-my-zsh directory
      file:
        path: "{{ home_dir }}/.oh-my-zsh"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"

    - name: Check if oh-my-zsh is already installed
      stat:
        path: "{{ home_dir }}/.oh-my-zsh/oh-my-zsh.sh"
      register: oh_my_zsh_stat

    - name: Install oh-my-zsh using wget
      shell: "wget -qO- {{ oh_my_zsh_url }} | sh"
      become_user: "{{ user }}"
      become: yes
      when: not oh_my_zsh_stat.stat.exists

    - name: Create oh-my-zsh custom plugins directory
      file:
        path: "{{ oh_my_zsh_plugins_dir }}"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"

    - name: Create oh-my-zsh custom themes directory
      file:
        path: "{{ oh_my_zsh_themes_dir }}"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"

    - name: Install zsh-syntax-highlighting plugin
      git:
        repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git"
        dest: "{{ oh_my_zsh_plugins_dir }}/zsh-syntax-highlighting"
        version: master
      become_user: "{{ user }}"
      become: yes

    - name: Install zsh-autosuggestions plugin
      git:
        repo: "https://github.com/zsh-users/zsh-autosuggestions.git"
        dest: "{{ oh_my_zsh_plugins_dir }}/zsh-autosuggestions"
        version: master
      become_user: "{{ user }}"
      become: yes

    - name: Install zsh-completions plugin
      git:
        repo: "https://github.com/zsh-users/zsh-completions.git"
        dest: "{{ oh_my_zsh_plugins_dir }}/zsh-completions"
        version: master
      become_user: "{{ user }}"
      become: yes

    - name: Install fzf-tab plugin
      git:
        repo: "https://github.com/Aloxaf/fzf-tab.git"
        dest: "{{ oh_my_zsh_plugins_dir }}/fzf-tab"
        version: master
      become_user: "{{ user }}"
      become: yes

    - name: Install powerlevel10k theme
      git:
        repo: "https://github.com/romkatv/powerlevel10k.git"
        dest: "{{ oh_my_zsh_themes_dir }}/powerlevel10k"
        version: master
      become_user: "{{ user }}"
      become: yes

    - name: Download chezmoi installer
      get_url:
        url: "{{ chezmoi_installer_url }}"
        dest: "/tmp/chezmoi-installer.sh"
        mode: '0755'

    - name: Install and initialize chezmoi with dotfiles
      shell: |
        sh /tmp/chezmoi-installer.sh -- init --apply {{ github_user }}
      become_user: "{{ user }}"
      become: yes
      environment:
        CHEZMOI_NAME: "{{ chezmoi_name | default('') }}"
        CHEZMOI_EMAIL: "{{ chezmoi_email | default('') }}"

    - name: Clean up chezmoi installer
      file:
        path: "/tmp/chezmoi-installer.sh"
        state: absent

    - name: Ensure proper permissions on home directory
      file:
        path: "{{ home_dir }}"
        owner: "{{ user }}"
        group: "{{ user }}"
        recurse: yes
