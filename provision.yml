---
- name: Provision system with dotfiles
  hosts: localhost
  gather_facts: yes
  
  vars:
    # Get the actual user (handles both normal and sudo execution)
    actual_user: "{{ ansible_user_id if ansible_user_id != 'root' else ansible_env.SUDO_USER | default(ansible_user_id) }}"
    user: "{{ actual_user }}"
    home_dir: "{{ ansible_env.HOME if ansible_user_id == actual_user else '/home/' + actual_user }}"
    dotfiles_dir: "{{ playbook_dir }}"
    group: "{{ 'staff' if ansible_os_family == 'Darwin' else user }}"
    should_become: "{{ ansible_os_family == 'Debian' }}"

  roles:
    - common
    - packages
    - shell
    - chezmoi

  post_tasks:
    - name: Ensure proper permissions on home directory
      file:
        path: "{{ home_dir }}"
        owner: "{{ user }}"
        group: "{{ group }}"
      become: "{{ should_become }}"

    - name: Fix permissions on dotfiles directories
      shell: |
        chown -R {{ user }}:{{ group }} "{{ home_dir }}/.config" 2>/dev/null || true
        chown -R {{ user }}:{{ group }} "{{ home_dir }}/.local" 2>/dev/null || true
        chown -R {{ user }}:{{ group }} "{{ home_dir }}/.oh-my-zsh" 2>/dev/null || true
        chown -R {{ user }}:{{ group }} "{{ home_dir }}/.zshenv" 2>/dev/null || true
        chown -R {{ user }}:{{ group }} "{{ home_dir }}/.tmux.conf" 2>/dev/null || true
      become: "{{ should_become }}"
      changed_when: false
