---
# ── Clone the plugin repository to a persistent location ─────────────────────

- name: Ensure plugin parent directory exists
  file:
    path: "{{ ecc_clone_dest | dirname }}"
    state: directory
    owner: "{{ user }}"
    mode: '0755'

- name: Clone/update everything-claude-code repository
  git:
    repo: "{{ ecc_repo_url }}"
    dest: "{{ ecc_clone_dest }}"
    update: true
    force: false
  become_user: "{{ user }}"

- name: Install Node dependencies
  community.general.npm:
    path: "{{ ecc_clone_dest }}"
    state: present
  become_user: "{{ user }}"

# ── settings.json: marketplace, plugin, and token optimization ────────────────
# All settings.json mutations go through merge_settings.py for safe conflict
# detection and optional user confirmation before overwriting.

- name: Compile merge_settings
  command: go build -o {{ role_path }}/files/merge_settings {{ role_path }}/files/merge_settings.go
  args:
    creates: "{{ role_path }}/files/merge_settings"
  changed_when: false

- name: Analyse settings.json for safe merge
  command: >
    {{ role_path }}/files/merge_settings
    {{ home_dir }}/.claude/settings.json
    {{ ecc_clone_dest }}
  register: ecc_analysis_raw
  changed_when: false
  when: ecc_token_optimization

- name: Parse merge analysis result
  set_fact:
    ecc_settings: "{{ ecc_analysis_raw.stdout | from_json }}"
  when:
    - ecc_token_optimization
    - ecc_analysis_raw.stdout | default('') != ''

- name: Abort — could not parse settings.json
  debug:
    msg: >
      Could not parse ~/.claude/settings.json:
      {{ ecc_settings.details | join(', ') }}
      Token optimization skipped. Fix the JSON and re-run.
  when:
    - ecc_token_optimization
    - ecc_settings is defined
    - ecc_settings.status == 'parse_error'

- name: Prompt user about conflicting values
  pause:
    prompt: |

      The following keys in ~/.claude/settings.json would be overwritten:
      {% for detail in ecc_settings.details %}
        • {{ detail }}
      {% endfor %}

      Proceed and overwrite? [yes/no]
  register: ecc_conflict_response
  when:
    - ecc_token_optimization
    - ecc_settings is defined
    - ecc_settings.status == 'conflict'

- name: Inform user that token optimization was skipped
  debug:
    msg: "Token optimization skipped — existing ~/.claude/settings.json values preserved."
  when:
    - ecc_token_optimization
    - ecc_settings is defined
    - ecc_settings.status == 'conflict'
    - (ecc_conflict_response.user_input | default('no')) | lower not in ['yes', 'y']

- name: Write merged settings.json
  copy:
    content: "{{ ecc_settings.merged | to_nice_json }}\n"
    dest: "{{ home_dir }}/.claude/settings.json"
    owner: "{{ user }}"
    mode: '0600'
  when:
    - ecc_token_optimization
    - ecc_settings is defined
    - ecc_settings.status in ['new', 'ok'] or
      (ecc_settings.status == 'conflict' and
       (ecc_conflict_response.user_input | default('no')) | lower in ['yes', 'y'])
