---
- name: Download chezmoi installer
  get_url:
    url: "{{ chezmoi_installer_url }}"
    dest: "/tmp/chezmoi-installer.sh"
    mode: '0755'

- name: Install chezmoi binary
  shell: |
    cd {{ home_dir }} && sh /tmp/chezmoi-installer.sh
  become_user: "{{ user }}"
  become: "{{ should_become }}"
  register: chezmoi_install

- name: Show chezmoi installer output
  debug:
    msg: |
      Chezmoi installer output:
      STDOUT: {{ chezmoi_install.stdout }}
      STDERR: {{ chezmoi_install.stderr }}
      RC: {{ chezmoi_install.rc }}

- name: Verify chezmoi binary exists
  stat:
    path: "{{ home_dir }}/.local/bin/chezmoi"
  register: chezmoi_binary

- name: Fail if chezmoi binary was not installed
  fail:
    msg: "Chezmoi binary was not found at {{ home_dir }}/.local/bin/chezmoi after installation"
  when: not chezmoi_binary.stat.exists

- name: Initialize and apply chezmoi with local dotfiles
  shell: |
    {{ home_dir }}/.local/bin/chezmoi init --apply --source "{{ dotfiles_dir }}"
  become_user: "{{ user }}"
  become: "{{ should_become }}"

- name: Clean up chezmoi installer
  file:
    path: "/tmp/chezmoi-installer.sh"
    state: absent
