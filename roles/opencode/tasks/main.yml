---
- name: Check if opencode is already installed
  command: which opencode
  register: opencode_check
  failed_when: false
  changed_when: false

- name: Create temporary directory for opencode installation
  tempfile:
    state: directory
    suffix: _opencode
  register: opencode_temp_dir
  when: opencode_check.rc != 0

- name: Download and extract opencode install script
  shell: |
    curl -fsSL https://opencode.ai/install > {{ opencode_temp_dir.path }}/install.sh
    chmod +x {{ opencode_temp_dir.path }}/install.sh
  args:
    executable: /bin/bash
  when: opencode_check.rc != 0
  register: opencode_download

- name: Run opencode install script
  shell: |
    bash {{ opencode_temp_dir.path }}/install.sh --no-modify-path
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_facts['user_dir'] }}"
  when: opencode_check.rc != 0
  register: opencode_install

- name: Verify opencode installation
  command: "{{ ansible_facts['user_dir'] }}/.local/bin/opencode --version"
  register: opencode_version
  changed_when: false
  failed_when: false

- name: Clean up temporary directory
  file:
    path: "{{ opencode_temp_dir.path }}"
    state: absent
  when: opencode_temp_dir is defined and opencode_temp_dir.path is defined
