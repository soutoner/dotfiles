---
- name: Check if claude is already installed
  shell: which claude
  register: claude_check
  failed_when: false
  changed_when: false

- name: Install Claude Code
  shell: curl -fsSL {{ claude_installer_url }} | bash
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ home_dir }}"
  become_user: "{{ user }}"
  when: claude_check.rc != 0
